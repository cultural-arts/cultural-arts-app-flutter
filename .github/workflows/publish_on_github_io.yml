name: Build Flutter Web

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Trigger Astro Rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAGES_REPO_TOKEN }}" \
            https://api.github.com/repos/cultural-arts/cultural-arts.github.io/dispatches \
            -d '{"event_type":"flutter-update"}'